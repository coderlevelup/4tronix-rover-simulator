<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Status</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 2rem;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
            color: #fff;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 2rem;
        }

        .cards {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-width: 640px;
        }

        .card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 1.25rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1.25rem;
        }

        .badge {
            flex-shrink: 0;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            font-weight: 700;
        }

        .badge.green  { background: #14532d; color: #4ade80; border: 2px solid #22c55e; }
        .badge.amber  { background: #451a03; color: #fb923c; border: 2px solid #f97316; }
        .badge.red    { background: #450a0a; color: #f87171; border: 2px solid #ef4444; }
        .badge.grey   { background: #1c1c1c; color: #555;    border: 2px solid #333; }

        .card-body { flex: 1; }

        .card-title {
            font-size: 1rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 0.35rem;
        }

        .card-detail {
            font-size: 0.82rem;
            color: #888;
            line-height: 1.6;
        }

        .card-detail span { color: #ccc; }

        .status-label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-top: 0.25rem;
        }

        .status-label.green { color: #4ade80; }
        .status-label.amber { color: #fb923c; }
        .status-label.red   { color: #f87171; }
        .status-label.grey  { color: #555; }

        .footer {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #444;
        }

        .nav {
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
        }

        .nav a { color: #4a9eff; text-decoration: none; margin-right: 1rem; }
        .nav a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="nav">
        <a href="/">Home</a>
        <a href="/code/">Code</a>
        <a href="/monitor/">Monitor</a>
    </div>

    <h1>System Status</h1>
    <p class="subtitle">Rover URL: {{ rover_url }}</p>

    <div class="cards" id="cards">
        <!-- Satellite -->
        <div class="card" id="card-satellite">
            <div class="badge grey" id="badge-satellite">?</div>
            <div class="card-body">
                <div class="card-title">Satellite</div>
                <div class="card-detail" id="detail-satellite">Loading&hellip;</div>
                <div class="status-label grey" id="label-satellite">checking</div>
            </div>
        </div>

        <!-- Rover -->
        <div class="card" id="card-rover">
            <div class="badge grey" id="badge-rover">?</div>
            <div class="card-body">
                <div class="card-title">Rover</div>
                <div class="card-detail" id="detail-rover">Loading&hellip;</div>
                <div class="status-label grey" id="label-rover">checking</div>
            </div>
        </div>

        <!-- Camera -->
        <div class="card" id="card-camera">
            <div class="badge grey" id="badge-camera">?</div>
            <div class="card-body">
                <div class="card-title">Camera</div>
                <div class="card-detail" id="detail-camera">Loading&hellip;</div>
                <div class="status-label grey" id="label-camera">checking</div>
            </div>
        </div>
    </div>

    <div class="footer" id="footer">Checking&hellip;</div>

    <script>
        function setBadge(id, state) {
            const el = document.getElementById('badge-' + id);
            const lbl = document.getElementById('label-' + id);
            el.className = 'badge ' + state.colour;
            el.textContent = state.icon;
            lbl.className = 'status-label ' + state.colour;
            lbl.textContent = state.text;
        }

        function setDetail(id, html) {
            document.getElementById('detail-' + id).innerHTML = html;
        }

        function row(label, value) {
            return label + ': <span>' + (value ?? '—') + '</span>  ';
        }

        function poll() {
            fetch('/api/status')
                .then(r => r.json())
                .then(data => {
                    // Satellite — always green if this page loaded
                    setBadge('satellite', { colour: 'green', icon: '✓', text: 'OK' });
                    setDetail('satellite',
                        row('Hostname', data.satellite.hostname) +
                        row('IP', data.satellite.ip)
                    );

                    // Rover
                    const r = data.rover;
                    if (!r.reachable) {
                        setBadge('rover', { colour: 'red', icon: '✗', text: 'Unreachable' });
                        setDetail('rover', row('URL', r.url));
                    } else if (r.status && r.status !== 'ok') {
                        // Reachable but the queue processor thread is dead:
                        // commands would be accepted yet never executed
                        setBadge('rover', { colour: 'red', icon: '✗', text: 'Processor stalled' });
                        setDetail('rover',
                            row('Driver', r.driver) +
                            row('Queue', r.queue_size)
                        );
                    } else {
                        if (r.hardware === false) {
                            setBadge('rover', { colour: 'amber', icon: '!', text: 'Fake driver (no hardware)' });
                        } else {
                            setBadge('rover', { colour: 'green', icon: '✓', text: 'OK' });
                        }
                        setDetail('rover',
                            row('Driver', r.driver) +
                            row('Queue', r.queue_size)
                        );
                    }

                    // Camera
                    const c = data.camera;
                    if (c.reachable) {
                        setBadge('camera', { colour: 'green', icon: '✓', text: 'OK' });
                        setDetail('camera', row('Port', c.port));
                    } else {
                        setBadge('camera', { colour: 'red', icon: '✗', text: 'Port closed' });
                        setDetail('camera', row('Port', c.port) + '(service not running?)');
                    }

                    const now = new Date().toLocaleTimeString();
                    document.getElementById('footer').textContent = 'Last checked: ' + now;
                })
                .catch(() => {
                    document.getElementById('footer').textContent = 'Fetch failed — retrying…';
                });
        }

        poll();
        setInterval(poll, 5000);
    </script>
</body>
</html>
