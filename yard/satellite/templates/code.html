<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a1a2e">
    <title>Rover Code</title>
    <link rel="manifest" href="/static/manifest.json">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            background: #16213e;
            border-bottom: 1px solid #0f3460;
        }

        .toolbar-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .toolbar-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 44px;
            border: none;
            border-radius: 14px;
            font-size: 32px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-run {
            background: #4CAF50;
            color: white;
        }

        .btn-run:hover {
            background: #45a049;
        }

        .btn-stop {
            background: #f44336;
            color: white;
        }

        .btn-stop:hover {
            background: #da190b;
        }

        .btn-clear {
            background: #666;
            color: white;
        }

        .btn-clear:hover {
            background: #555;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 22px;
            border-radius: 28px;
            font-size: 22px;
            color: #aaa;
            background: rgba(255,255,255,0.1);
        }

        .status-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #666;
        }

        .status-dot.connected {
            background: #4CAF50;
        }

        .status-dot.spy {
            background: #ff9800;
        }

        /* Tab bar */
        .tab-bar {
            display: flex;
            background: #16213e;
            border-bottom: 2px solid #0f3460;
        }

        .tab-btn {
            padding: 18px 48px;
            border: none;
            background: transparent;
            color: #888;
            font-size: 26px;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 4px solid transparent;
            margin-bottom: -2px;
            transition: color 0.2s;
        }

        .tab-btn.active {
            color: #fff;
            border-bottom-color: #4CAF50;
        }

        .tab-btn:hover:not(.active) {
            color: #ccc;
        }

        /* Panes */
        .pane {
            display: none;
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .pane.active {
            display: flex;
            flex-direction: column;
        }

        /* Blockly */
        .blockly-container {
            flex: 1;
            position: relative;
        }

        #blocklyDiv {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }

        /* Python editor */
        .python-container {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        #pythonEditor {
            flex: 1;
        }

        /* Spy output panel */
        .spy-panel {
            display: none;
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            max-height: 200px;
            background: rgba(0,0,0,0.9);
            border-top: 2px solid #ff9800;
            overflow-y: auto;
            z-index: 100;
        }

        .spy-panel.visible {
            display: block;
        }

        .spy-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: #ff9800;
            color: #000;
            font-weight: 600;
            font-size: 12px;
        }

        .spy-close {
            cursor: pointer;
            padding: 2px 8px;
            background: rgba(0,0,0,0.2);
            border-radius: 4px;
        }

        .spy-content {
            padding: 8px 12px;
            font-family: monospace;
            font-size: 12px;
            color: #fff;
        }

        .spy-content div {
            padding: 2px 0;
        }

        /* Toast notifications */
        .toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            padding: 20px 44px;
            background: #333;
            color: #fff;
            border-radius: 14px;
            font-size: 26px;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .toast.visible {
            opacity: 1;
        }

        .toast.success {
            background: #4CAF50;
        }

        .toast.error {
            background: #f44336;
        }
    </style>
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <script src="https://unpkg.com/monaco-editor@0.52.0/min/vs/loader.js"></script>
</head>
<body>
    <div class="container">
        <div class="toolbar">
            <div class="toolbar-left">
                <button class="btn btn-run" id="runBtn">Run</button>
                <button class="btn btn-stop" id="stopBtn">Stop</button>
                <button class="btn btn-clear" id="clearBtn">Clear</button>
            </div>
            <div class="toolbar-right">
                <div class="status-indicator">
                    <span class="status-dot" id="statusDot"></span>
                    <span id="statusText">Connecting...</span>
                </div>
            </div>
        </div>

        <div class="tab-bar">
            <button class="tab-btn active" id="tabBlockly">Blockly</button>
            <button class="tab-btn" id="tabPython">Python</button>
        </div>

        <!-- Blockly pane -->
        <div class="pane active" id="paneBlockly">
            <div class="blockly-container">
                <div id="blocklyDiv"></div>
                <div class="spy-panel" id="spyPanel">
                    <div class="spy-header">
                        <span>Spy Mode - Commands Preview</span>
                        <span class="spy-close" id="spyClose">Close</span>
                    </div>
                    <div class="spy-content" id="spyOutput"></div>
                </div>
            </div>
        </div>

        <!-- Python editor pane -->
        <div class="pane" id="panePython">
            <div class="python-container">
                <div id="pythonEditor"></div>
            </div>
        </div>
    </div>
    <div class="toast" id="toast"></div>

    <script>
        // ============================================================
        // Ports & Adapters Pattern for Testability
        // ============================================================

        class RoverService {
            async addToQueue(instructions) { throw new Error("Not implemented"); }
            async clearQueue() { throw new Error("Not implemented"); }
            async getStatus() { throw new Error("Not implemented"); }
        }

        class RealRoverService extends RoverService {
            constructor(baseUrl) {
                super();
                this.baseUrl = baseUrl;
            }

            async addToQueue(instructions) {
                const resp = await fetch(`${this.baseUrl}/api/queue/add`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(instructions)
                });
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                return resp.json();
            }

            async clearQueue() {
                const resp = await fetch(`${this.baseUrl}/api/queue/clear`, {
                    method: 'POST'
                });
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                return resp.json();
            }

            async getStatus() {
                const resp = await fetch(`${this.baseUrl}/api/queue/status`);
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                return resp.json();
            }

            async checkHealth() {
                try {
                    const resp = await fetch(`${this.baseUrl}/api/health`);
                    return resp.ok;
                } catch {
                    return false;
                }
            }
        }

        class SpyRoverService extends RoverService {
            constructor(outputElement) {
                super();
                this.output = outputElement;
            }

            async addToQueue(instructions) {
                this.log(`Would send ${instructions.length} instruction(s):`);
                instructions.forEach(i => {
                    if (i.cmd === 'run_python') {
                        this.log(`  - run_python:`);
                        (i.params.code || '').split('\n').forEach(line => {
                            this.log(`      ${line}`);
                        });
                    } else {
                        const params = Object.entries(i.params || {})
                            .map(([k, v]) => `${k}: ${v}`)
                            .join(', ');
                        this.log(`  - ${i.cmd} {${params}}`);
                    }
                });
                return {status: 'spy', added: instructions.length};
            }

            async clearQueue() {
                this.log('Would clear queue and stop rover');
                return {status: 'spy', cleared: 0};
            }

            async getStatus() {
                return {current: null, pending: [], history: []};
            }

            async checkHealth() {
                return true;
            }

            log(msg) {
                console.log(`[SPY] ${msg}`);
                if (this.output) {
                    this.output.innerHTML += `<div>${msg}</div>`;
                    this.output.scrollTop = this.output.scrollHeight;
                }
            }

            clear() {
                if (this.output) {
                    this.output.innerHTML = '';
                }
            }
        }

        // ============================================================
        // Blockly Block Definitions
        // ============================================================

        Blockly.Blocks['rover_on_receive'] = {
            init: function() {
                this.appendDummyInput()
                    .appendField("\uD83D\uDEF0\uFE0F On uplink");
                this.appendStatementInput("DO")
                    .setCheck(null);
                this.setColour("#FF6D00");
                this.setTooltip("Blocks inside run when sent to the rover");
            }
        };

        Blockly.Blocks['rover_forward'] = {
            init: function() {
                this.appendDummyInput()
                    .appendField("Move Forward")
                    .appendField(new Blockly.FieldNumber(1, 0.1, 10, 0.1), "TIME")
                    .appendField("seconds");
                this.setPreviousStatement(true, null);
                this.setNextStatement(true, null);
                this.setColour("#2196F3");
                this.setTooltip("Move the rover forward");
            }
        };

        Blockly.Blocks['rover_backward'] = {
            init: function() {
                this.appendDummyInput()
                    .appendField("Move Backward")
                    .appendField(new Blockly.FieldNumber(1, 0.1, 10, 0.1), "TIME")
                    .appendField("seconds");
                this.setPreviousStatement(true, null);
                this.setNextStatement(true, null);
                this.setColour("#2196F3");
                this.setTooltip("Move the rover backward");
            }
        };

        Blockly.Blocks['rover_spin_left'] = {
            init: function() {
                this.appendDummyInput()
                    .appendField("Spin Left")
                    .appendField(new Blockly.FieldNumber(0.5, 0.1, 10, 0.1), "TIME")
                    .appendField("seconds");
                this.setPreviousStatement(true, null);
                this.setNextStatement(true, null);
                this.setColour("#9C27B0");
                this.setTooltip("Spin the rover left in place");
            }
        };

        Blockly.Blocks['rover_spin_right'] = {
            init: function() {
                this.appendDummyInput()
                    .appendField("Spin Right")
                    .appendField(new Blockly.FieldNumber(0.5, 0.1, 10, 0.1), "TIME")
                    .appendField("seconds");
                this.setPreviousStatement(true, null);
                this.setNextStatement(true, null);
                this.setColour("#9C27B0");
                this.setTooltip("Spin the rover right in place");
            }
        };

        Blockly.Blocks['rover_stop'] = {
            init: function() {
                this.appendDummyInput()
                    .appendField("Stop");
                this.setPreviousStatement(true, null);
                this.setNextStatement(true, null);
                this.setColour("#f44336");
                this.setTooltip("Stop the rover immediately");
            }
        };

        Blockly.Blocks['rover_steer_left'] = {
            init: function() {
                this.appendDummyInput()
                    .appendField("Steer Left")
                    .appendField(new Blockly.FieldNumber(20, 5, 45, 5), "DEGREES")
                    .appendField("degrees for")
                    .appendField(new Blockly.FieldNumber(1, 0.1, 10, 0.1), "TIME")
                    .appendField("seconds");
                this.setPreviousStatement(true, null);
                this.setNextStatement(true, null);
                this.setColour("#00BCD4");
                this.setTooltip("Steer left while moving forward");
            }
        };

        Blockly.Blocks['rover_steer_right'] = {
            init: function() {
                this.appendDummyInput()
                    .appendField("Steer Right")
                    .appendField(new Blockly.FieldNumber(20, 5, 45, 5), "DEGREES")
                    .appendField("degrees for")
                    .appendField(new Blockly.FieldNumber(1, 0.1, 10, 0.1), "TIME")
                    .appendField("seconds");
                this.setPreviousStatement(true, null);
                this.setNextStatement(true, null);
                this.setColour("#00BCD4");
                this.setTooltip("Steer right while moving forward");
            }
        };

        Blockly.Blocks['rover_wait'] = {
            init: function() {
                this.appendDummyInput()
                    .appendField("Wait")
                    .appendField(new Blockly.FieldNumber(1, 0.1, 10, 0.1), "TIME")
                    .appendField("seconds");
                this.setPreviousStatement(true, null);
                this.setNextStatement(true, null);
                this.setColour("#4CAF50");
                this.setTooltip("Wait for specified time");
            }
        };

        Blockly.Blocks['rover_repeat'] = {
            init: function() {
                this.appendDummyInput()
                    .appendField("Repeat")
                    .appendField(new Blockly.FieldNumber(3, 1, 20, 1), "TIMES")
                    .appendField("times");
                this.appendStatementInput("DO")
                    .setCheck(null);
                this.setPreviousStatement(true, null);
                this.setNextStatement(true, null);
                this.setColour("#FF9800");
                this.setTooltip("Repeat the blocks inside");
            }
        };

        // ============================================================
        // Toolbox Configuration
        // ============================================================

        const toolbox = {
            kind: 'categoryToolbox',
            contents: [
                {
                    kind: 'category',
                    name: '\uD83D\uDEF0\uFE0F Uplink',
                    colour: '#FF6D00',
                    contents: [
                        {kind: 'block', type: 'rover_on_receive'}
                    ]
                },
                {
                    kind: 'category',
                    name: 'Movement',
                    colour: '#2196F3',
                    contents: [
                        {kind: 'block', type: 'rover_forward'},
                        {kind: 'block', type: 'rover_backward'},
                        {kind: 'block', type: 'rover_steer_left'},
                        {kind: 'block', type: 'rover_steer_right'},
                        {kind: 'block', type: 'rover_spin_left'},
                        {kind: 'block', type: 'rover_spin_right'},
                        {kind: 'block', type: 'rover_stop'}
                    ]
                },
                {
                    kind: 'category',
                    name: 'Control',
                    colour: '#FF9800',
                    contents: [
                        {kind: 'block', type: 'rover_wait'},
                        {kind: 'block', type: 'rover_repeat'}
                    ]
                }
            ]
        };

        // ============================================================
        // Workspace Initialization
        // ============================================================

        const workspace = Blockly.inject('blocklyDiv', {
            toolbox: toolbox,
            zoom: {
                controls: true,
                wheel: true,
                startScale: 1.5,
                maxScale: 3,
                minScale: 0.5,
                scaleSpeed: 1.2
            },
            trashcan: true,
            move: {
                scrollbars: true,
                drag: true,
                wheel: true
            },
            grid: {
                spacing: 20,
                length: 3,
                colour: '#333',
                snap: true
            },
            theme: Blockly.Theme.defineTheme('dark', {
                base: Blockly.Themes.Classic,
                componentStyles: {
                    workspaceBackgroundColour: '#1a1a2e',
                    toolboxBackgroundColour: '#16213e',
                    toolboxForegroundColour: '#fff',
                    flyoutBackgroundColour: '#252525',
                    flyoutForegroundColour: '#ccc',
                    flyoutOpacity: 1,
                    scrollbarColour: '#555',
                    insertionMarkerColour: '#fff',
                    insertionMarkerOpacity: 0.3,
                    scrollbarOpacity: 0.5,
                    cursorColour: '#fff'
                }
            })
        });

        // ============================================================
        // Python Code Generator (from Blockly workspace)
        // ============================================================

        function generatePythonCode() {
            const lines = [];

            function blockToLines(block, indent) {
                if (!block) return;
                const pad = '    '.repeat(indent);
                const type = block.type;

                switch (type) {
                    case 'rover_on_receive': {
                        blockToLines(block.getInputTargetBlock('DO'), indent);
                        return;  // hat block — no next block to follow
                    }
                    case 'rover_forward': {
                        const t = block.getFieldValue('TIME');
                        lines.push(`${pad}rover.setServo(9, 0)`);
                        lines.push(`${pad}rover.setServo(11, 0)`);
                        lines.push(`${pad}rover.setServo(13, 0)`);
                        lines.push(`${pad}rover.setServo(15, 0)`);
                        lines.push(`${pad}rover.forward(60)`);
                        lines.push(`${pad}time.sleep(${t})`);
                        lines.push(`${pad}rover.stop()`);
                        break;
                    }
                    case 'rover_backward': {
                        const t = block.getFieldValue('TIME');
                        lines.push(`${pad}rover.setServo(9, 0)`);
                        lines.push(`${pad}rover.setServo(11, 0)`);
                        lines.push(`${pad}rover.setServo(13, 0)`);
                        lines.push(`${pad}rover.setServo(15, 0)`);
                        lines.push(`${pad}rover.reverse(60)`);
                        lines.push(`${pad}time.sleep(${t})`);
                        lines.push(`${pad}rover.stop()`);
                        break;
                    }
                    case 'rover_spin_left': {
                        const t = block.getFieldValue('TIME');
                        lines.push(`${pad}rover.stop()`);
                        lines.push(`${pad}rover.setServo(9, 50)`);
                        lines.push(`${pad}rover.setServo(15, -50)`);
                        lines.push(`${pad}rover.setServo(11, -50)`);
                        lines.push(`${pad}rover.setServo(13, 50)`);
                        lines.push(`${pad}rover.spinLeft(60)`);
                        lines.push(`${pad}time.sleep(${t})`);
                        lines.push(`${pad}rover.stop()`);
                        break;
                    }
                    case 'rover_spin_right': {
                        const t = block.getFieldValue('TIME');
                        lines.push(`${pad}rover.stop()`);
                        lines.push(`${pad}rover.setServo(9, 50)`);
                        lines.push(`${pad}rover.setServo(15, -50)`);
                        lines.push(`${pad}rover.setServo(11, -50)`);
                        lines.push(`${pad}rover.setServo(13, 50)`);
                        lines.push(`${pad}rover.spinRight(60)`);
                        lines.push(`${pad}time.sleep(${t})`);
                        lines.push(`${pad}rover.stop()`);
                        break;
                    }
                    case 'rover_stop':
                        lines.push(`${pad}rover.stop()`);
                        break;
                    case 'rover_steer_left': {
                        const d = block.getFieldValue('DEGREES');
                        const t = block.getFieldValue('TIME');
                        lines.push(`${pad}rover.setServo(9, -${d})`);
                        lines.push(`${pad}rover.setServo(15, -${d})`);
                        lines.push(`${pad}rover.setServo(11, ${d})`);
                        lines.push(`${pad}rover.setServo(13, ${d})`);
                        lines.push(`${pad}rover.forward(60)`);
                        lines.push(`${pad}time.sleep(${t})`);
                        lines.push(`${pad}rover.stop()`);
                        lines.push(`${pad}rover.setServo(9, 0)`);
                        lines.push(`${pad}rover.setServo(11, 0)`);
                        lines.push(`${pad}rover.setServo(13, 0)`);
                        lines.push(`${pad}rover.setServo(15, 0)`);
                        break;
                    }
                    case 'rover_steer_right': {
                        const d = block.getFieldValue('DEGREES');
                        const t = block.getFieldValue('TIME');
                        lines.push(`${pad}rover.setServo(9, ${d})`);
                        lines.push(`${pad}rover.setServo(15, ${d})`);
                        lines.push(`${pad}rover.setServo(11, -${d})`);
                        lines.push(`${pad}rover.setServo(13, -${d})`);
                        lines.push(`${pad}rover.forward(60)`);
                        lines.push(`${pad}time.sleep(${t})`);
                        lines.push(`${pad}rover.stop()`);
                        lines.push(`${pad}rover.setServo(9, 0)`);
                        lines.push(`${pad}rover.setServo(11, 0)`);
                        lines.push(`${pad}rover.setServo(13, 0)`);
                        lines.push(`${pad}rover.setServo(15, 0)`);
                        break;
                    }
                    case 'rover_wait': {
                        const t = block.getFieldValue('TIME');
                        lines.push(`${pad}time.sleep(${t})`);
                        break;
                    }
                    case 'rover_repeat': {
                        const times = block.getFieldValue('TIMES');
                        lines.push(`${pad}for _ in range(${times}):`);
                        let inner = block.getInputTargetBlock('DO');
                        while (inner) {
                            blockToLines(inner, indent + 1);
                            inner = inner.getNextBlock();
                        }
                        break;
                    }
                }

                blockToLines(block.getNextBlock(), indent);
            }

            workspace.getTopBlocks(true)
                .filter(b => b.type === 'rover_on_receive')
                .forEach(b => blockToLines(b, 0));
            return lines.join('\n') + '\n';
        }

        // ============================================================
        // Tab Switching
        // ============================================================

        let activeTab = 'blockly';

        document.getElementById('tabBlockly').addEventListener('click', () => {
            activeTab = 'blockly';
            document.getElementById('tabBlockly').classList.add('active');
            document.getElementById('tabPython').classList.remove('active');
            document.getElementById('paneBlockly').classList.add('active');
            document.getElementById('panePython').classList.remove('active');
            Blockly.svgResize(workspace);
        });

        document.getElementById('tabPython').addEventListener('click', () => {
            activeTab = 'python';
            document.getElementById('tabPython').classList.add('active');
            document.getElementById('tabBlockly').classList.remove('active');
            document.getElementById('panePython').classList.add('active');
            document.getElementById('paneBlockly').classList.remove('active');
        });

        // ============================================================
        // Service Initialization (DI based on URL param)
        // ============================================================

        // ?spy=true preferred; ?mock=true kept as a legacy alias for old bookmarks
        const urlParams = new URL(location).searchParams;
        const isSpyMode = urlParams.get('spy') === 'true' || urlParams.get('mock') === 'true';
        const spyOutput = document.getElementById('spyOutput');
        const spyPanel = document.getElementById('spyPanel');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');

        const roverService = isSpyMode
            ? new SpyRoverService(spyOutput)
            : new RealRoverService('');

        // Update status indicator
        if (isSpyMode) {
            statusDot.classList.add('spy');
            statusText.textContent = 'Spy Mode';
            spyPanel.classList.add('visible');
        } else {
            // Check connection status periodically
            async function checkConnection() {
                const connected = await roverService.checkHealth();
                statusDot.classList.toggle('connected', connected);
                statusText.textContent = connected ? 'Connected' : 'Disconnected';
            }
            checkConnection();
            setInterval(checkConnection, 5000);
        }

        // ============================================================
        // UI Event Handlers
        // ============================================================

        const toast = document.getElementById('toast');

        function showToast(message, type = '') {
            toast.textContent = message;
            toast.className = 'toast visible ' + type;
            setTimeout(() => toast.classList.remove('visible'), 3000);
        }

        document.getElementById('runBtn').addEventListener('click', async () => {
            let code;
            let blockly_state = null;

            if (activeTab === 'blockly') {
                code = generatePythonCode();
                if (code.trim() === '') {
                    showToast('No blocks to run', 'error');
                    return;
                }
                blockly_state = JSON.stringify(Blockly.serialization.workspaces.save(workspace));
            } else {
                code = pythonEditor.getValue();
                if (code.trim() === '') {
                    showToast('No code to run', 'error');
                    return;
                }
            }

            if (isSpyMode) {
                roverService.clear();
            }

            try {
                const params = blockly_state ? {code, blockly_state} : {code};
                const result = await roverService.addToQueue([{cmd: 'run_python', params}]);
                showToast('Sent to rover', 'success');
            } catch (e) {
                showToast('Failed to send: ' + e.message, 'error');
            }
        });

        document.getElementById('stopBtn').addEventListener('click', async () => {
            try {
                await roverService.clearQueue();
                showToast('Stopped!', 'success');
            } catch (e) {
                showToast('Failed to stop: ' + e.message, 'error');
            }
        });

        document.getElementById('clearBtn').addEventListener('click', () => {
            if (activeTab === 'blockly') {
                workspace.clear();
                localStorage.removeItem('roverWorkspace');
                const block = workspace.newBlock('rover_on_receive');
                block.initSvg();
                block.render();
                block.moveBy(40, 40);
            } else {
                pythonEditor.setValue('');
                localStorage.removeItem(PYTHON_STORAGE_KEY);
            }
            if (isSpyMode) {
                roverService.clear();
            }
            showToast('Cleared');
        });

        document.getElementById('spyClose').addEventListener('click', () => {
            spyPanel.classList.remove('visible');
        });

        // ============================================================
        // Workspace Persistence
        // ============================================================

        const STORAGE_KEY = 'roverWorkspace';

        function saveWorkspace() {
            const state = Blockly.serialization.workspaces.save(workspace);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        }

        function loadWorkspace() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try {
                    const state = JSON.parse(saved);
                    Blockly.serialization.workspaces.load(state, workspace);
                    return;
                } catch (e) {
                    console.warn('Failed to load workspace:', e);
                }
            }
            // No saved state — start with an On uplink block
            const block = workspace.newBlock('rover_on_receive');
            block.initSvg();
            block.render();
            block.moveBy(40, 40);
        }

        // Save on change (debounced)
        let saveTimeout;
        workspace.addChangeListener(() => {
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(saveWorkspace, 500);
        });

        // Load on startup
        loadWorkspace();

        // Handle resize
        window.addEventListener('resize', () => Blockly.svgResize(workspace));

        // ============================================================
        // PWA Service Worker Registration
        // ============================================================

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/static/service-worker.js')
                .then(reg => console.log('Service worker registered'))
                .catch(err => console.warn('Service worker registration failed:', err));
        }

        // ============================================================
        // Monaco Editor Initialization
        // ============================================================

        let pythonEditor;

        const PYTHON_STORAGE_KEY = 'roverPythonCode';
        const DEFAULT_PYTHON = [
            '# Write Python directly — rover and time are available',
            '# Examples:',
            '#   rover.forward(60)',
            '#   time.sleep(1)',
            '#   rover.stop()',
            '',
            '# Loop:',
            'for i in range(4):',
            '    rover.forward(60)',
            '    time.sleep(1)',
            '    rover.stop()',
            '    rover.spinLeft(60)',
            '    time.sleep(0.5)',
            '    rover.stop()',
        ].join('\n');

        require.config({ paths: { vs: 'https://unpkg.com/monaco-editor@0.52.0/min/vs' } });
        require(['vs/editor/editor.main'], function () {
            pythonEditor = monaco.editor.create(document.getElementById('pythonEditor'), {
                value: localStorage.getItem(PYTHON_STORAGE_KEY) || DEFAULT_PYTHON,
                language: 'python',
                theme: 'vs-dark',
                fontSize: 14,
                minimap: { enabled: false },
                scrollBeyondLastLine: false,
                automaticLayout: true,
                tabSize: 4,
                insertSpaces: true,
            });

            // Save on change (debounced) — mirrors the Blockly persistence
            let pySaveTimeout;
            pythonEditor.onDidChangeModelContent(() => {
                clearTimeout(pySaveTimeout);
                pySaveTimeout = setTimeout(() => {
                    localStorage.setItem(PYTHON_STORAGE_KEY, pythonEditor.getValue());
                }, 500);
            });
        });
    </script>
</body>
</html>
